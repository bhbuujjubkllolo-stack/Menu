name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev autoconf git
        pip install --upgrade pip
        # Cài đặt bản sửa lỗi trực tiếp từ mã nguồn Buildozer
        pip install git+https://github.com/kivy/buildozer.git cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Helper-APK
        path: bin/*.apk
        
